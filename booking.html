<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accommodation Booking</title>
    <link rel="stylesheet" href="style.CSS" />
  </head>
  <body>
    <!--Booking Form Section-->
    <section class="booking" id="booking">
      <h1
        style="
          text-align: center;
          margin: 20px 0;
          background-color: #004aad;
          color: white;
        ">
        Book Your Accommodation
      </h1>
      <div class="booking-form">
        <form action="https://formspree.io/f/xgvpadva " method="POST">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            required />

          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required />

          <label for="phone">Phone Number</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="Enter your phone number"
            required />

          <label for="property">Select Property</label>
          <select id="property" name="property" required>
            <option value="">-- Choose a Property --</option>
            <option value="Navalsig">Navalsig</option>
            <option value="Westdene">Westdene</option>
            <option value="Bloemfontain-central">Bloemfontein Central</option>
          </select>

          <label for="movein">Move-In Date</label>
          <input type="date" id="movein" name="movein" required />

          <label for="duration">Lease Duration</label>
          <select id="duration" name="duration" required>
            <option value="">-- Select Duration --</option>
            <option value="3-months">3 Months</option>
            <option value="6-months">6 Months</option>
            <option value="10-months">10 Months</option>
          </select>

          <label for="message">Additional Message</label>
          <textarea
            id="message"
            name="message"
            rows="4"
            placeholder="Any specific requests or questions?"></textarea>

          <button type="submit">Submit Booking Request</button>
        </form>
      </div>
    </section>

    <!--Footer Section-->
    <button id="backToTop">↑</button>
    <footer>&copy; 2025 rhuleaccomodation. All rights reserved.</footer>

    <script src="Script.js"></script>
  </body>
</html>
