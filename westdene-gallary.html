<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Westdene Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Westdene Gallery</h1>
    <a href="index.html">← Back to Properties</a>

    <div class="gallery">
      <div>
        <img
          src="Westderne-images/Complex.jpg"
          alt="Complex"
          class="gal-images" />
      </div>
      <div>
        <img
          src="Westderne-images/Entrence.jpg"
          alt="Entrance"
          class="gal-images" />
      </div>
      <div>
        <img
          src="Westderne-images/Chillers.jpg"
          alt="Chillers"
          class="gal-images" />
      </div>
      <div>
        <img
          src="Westderne-images/Braai Place.jpg"
          alt="Braai Place"
          class="gal-images" />
      </div>
      <div>
        <img
          src="Westderne-images/Back-of Complex.jpg"
          alt="Back of Complex"
          class="gal-images" />
      </div>
      <div>
        <img
          src="Westderne-images/Packing Lort.jpg"
          alt="Parking Lot"
          class="gal-images" />
      </div>
      <div>
        <img src="Westderne-images/Room1.jpg" alt="Room " class="gal-images" />
      </div>
      <div>
        <img
          src="Westderne-images/Study-Room.jpg"
          alt="Study Room"
          class="gal-images" />
      </div>
      <div>
        <img
          src="Westderne-images/Laundry room.jpg"
          alt="Laundry-Room"
          class="gal-images" />
      </div>
      <div>
        <img
          src="Westderne-images/Washing Lines.jpg"
          alt="Washing-lines"
          class="gal-images" />
      </div>
    </div>

    <!-- Small-box -->
    <div id="lightbox" class="lightbox">
      <span class="close">&times;</span>
      <span class="prev">&#10094;</span>
      <span class="next">&#10095;</span>
      <img class="lightbox-content" id="lightbox-img" alt="Full View" />
      <div id="caption" class="caption"></div>
    </div>

    <script src="Script.js"></script>
  </body>
</html>
